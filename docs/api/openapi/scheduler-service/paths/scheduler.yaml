predictRetentionPlanned:
  post:
    operationId: predictSchedulerRetention
    summary: Predict retention probability
    description: |
      Computes retention prediction for one or more cards using scheduler models.
      Planned endpoint for scheduler-service Phase 4.
    x-noema-lifecycle: planned
    tags: [Scheduler]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              userId:
                $ref: ../openapi.yaml#/components/schemas/UserId
              cards:
                type: array
                minItems: 1
                items:
                  type: object
                  properties:
                    cardId:
                      $ref: ../openapi.yaml#/components/schemas/CardId
                    algorithm:
                      type: string
                      enum: [fsrs, hlr]
                    asOf:
                      type: string
                      format: date-time
                  required: [cardId, algorithm]
            required: [userId, cards]
    responses:
      "400":
        $ref: ../openapi.yaml#/components/responses/BadRequest
      "401":
        $ref: ../openapi.yaml#/components/responses/Unauthorized
      "403":
