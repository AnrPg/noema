      "403":
        $ref: ../openapi.yaml#/components/responses/Forbidden
      "429":
        $ref: ../openapi.yaml#/components/responses/TooManyRequests
      "500":
        $ref: ../openapi.yaml#/components/responses/InternalServerError

getReviewQueuePlanned:
  get:
    operationId: getSchedulerReviewQueue
    summary: Get due review queue
    description: |
      Returns due cards for a user with optional lane filtering and pagination.
      Planned endpoint for scheduler-service Phase 4.
    x-noema-lifecycle: planned
    tags: [Scheduler]
    parameters:
      - name: userId
        in: query
        required: true
        schema:
          $ref: ../openapi.yaml#/components/schemas/UserId
      - name: lane
        in: query
        required: false
        schema:
          type: string
          enum: [retention, calibration]
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 200
          default: 50
    responses:
      "400":
        $ref: ../openapi.yaml#/components/responses/BadRequest
      "401":
        $ref: ../openapi.yaml#/components/responses/Unauthorized
      "403":
        $ref: ../openapi.yaml#/components/responses/Forbidden
      "429":
        $ref: ../openapi.yaml#/components/responses/TooManyRequests
      "500":
        $ref: ../openapi.yaml#/components/responses/InternalServerError
      "501":
        $ref: ../openapi.yaml#/components/responses/PlannedNotImplemented

updateCardSchedulePlanned:
  patch:
    operationId: updateSchedulerCardSchedule
    summary: Update a single card schedule
    description: |
      Applies agent-approved schedule updates for one card.
      Planned endpoint for scheduler-service Phase 4.
    x-noema-lifecycle: planned
    tags: [Scheduler]
    parameters:
      - name: cardId
        in: path
        required: true
        schema:
          $ref: ../openapi.yaml#/components/schemas/CardId
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              userId:
                $ref: ../openapi.yaml#/components/schemas/UserId
              nextReviewDate:
                type: string
                format: date-time
              interval:
                type: integer
                minimum: 0
              schedulingAlgorithm:
                type: string
                enum: [fsrs, hlr, sm2]
              rationale:
                type: string
            required: [userId, nextReviewDate, interval, schedulingAlgorithm]
    responses:
      "400":
        $ref: ../openapi.yaml#/components/responses/BadRequest
      "401":
        $ref: ../openapi.yaml#/components/responses/Unauthorized
      "403":
        $ref: ../openapi.yaml#/components/responses/Forbidden
      "429":
        $ref: ../openapi.yaml#/components/responses/TooManyRequests
      "500":
        $ref: ../openapi.yaml#/components/responses/InternalServerError
      "501":
        $ref: ../openapi.yaml#/components/responses/PlannedNotImplemented

