listTools:
  get:
    operationId: listSchedulerTools
    summary: List available scheduler tools
    description: Returns scheduler MCP tool definitions available for execution.
    x-noema-lifecycle: active
    tags: [Tools]
    responses:
      "200":
        description: Tool definitions listed.
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/ToolListResponse
      "400":
        $ref: ../openapi.yaml#/components/responses/BadRequest
      "401":
        $ref: ../openapi.yaml#/components/responses/Unauthorized
      "403":
        $ref: ../openapi.yaml#/components/responses/Forbidden
      "429":
        $ref: ../openapi.yaml#/components/responses/TooManyRequests
      "500":
        $ref: ../openapi.yaml#/components/responses/InternalServerError

executeTool:
  post:
    operationId: executeSchedulerTool
    summary: Execute a scheduler tool
    description: |
      Executes a registered scheduler tool in the caller's security context.
      Returns structured tool success/failure result in `data`.

      ### Failure Classification Mapping

      | `error.code` / condition | `failureClass` | `retryClass` | `failureDomain` |
      | --- | --- | --- | --- |
      | `TOOL_INPUT_VALIDATION_FAILED` | `input.schema.invalid` | `permanent` | `validation` |
      | missing required scope | `auth.missing_scope` | `permanent` | `auth` |
      | invalid/expired token | `auth.invalid_token` | `permanent` | `auth` |
      | rate limit exceeded | `rate.limit.exceeded` | `transient` | `abuse` |
      | `TOOL_NOT_FOUND` / state conflict | `state.not_found` / `state.conflict` | `permanent` | `state` |
      | dependency or upstream failure | `dependency.unavailable` | `transient` | `dependency` |
      | timeout / unavailable | `network.timeout` | `transient` | `network` |
      | unhandled exception | `internal.exception` | `unknown` | `internal` |

      For transient failures, clients SHOULD honor `data.metadata.retryAfterMs`
      when present.
    x-noema-failure-catalog:
      schema:
        $ref: ../openapi.yaml#/components/schemas/ToolFailureClassificationCatalog
      version: 1.0.0
      source: shared-tooling-catalog
      notes: Canonical mapping for error.code to failureClass/retryClass/failureDomain.
    x-noema-lifecycle: active
    tags: [Tools]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../openapi.yaml#/components/schemas/ToolExecuteRequest
          examples:
            planDualLane:
              value:
                tool: plan-dual-lane
                input:
                  userId: usr_V1StGXR8_Z5jdHi6B-myT
                  retentionCardIds:
                    - card_retention_00000000001
                    - card_retention_00000000002
                  calibrationCardIds:
                    - card_calibration_000000001
                  maxCards: 2
            getSrsSchedule:
              value:
                tool: get-srs-schedule
                input:
                  userId: usr_V1StGXR8_Z5jdHi6B-myT
                  lane: retention
                  limit: 50
            predictRetention:
              value:
                tool: predict-retention
                input:
                  userId: usr_V1StGXR8_Z5jdHi6B-myT
                  cards:
                    - cardId: card_retention_00000000001
                      algorithm: fsrs
            applySessionAdjustments:
              value:
                tool: apply-session-adjustments
                input:
                  userId: usr_V1StGXR8_Z5jdHi6B-myT
                  sessionId: ses_01HZZ9R2Q4N9D4A7YW7P8A2J9M
                  adjustments:
                    - cardId: card_retention_00000000001
                      action: reprioritize
                      reason: Learner struggled in prior attempt
                      newPriority: 0.95
                  orchestration:
                    proposalId: prop_01HZZ9R2Q4N9D4A7YW7P8A2J9M
                    decisionId: dec_01HZZ9R2Q4N9D4A7YW7P8A2J9M
                    sessionRevision: 3
    responses:
      "200":
        description: Tool executed successfully.
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/ToolExecuteResponse
            examples:
              successWithMetadata:
                value:
                  data:
                    success: true
                    data:
                      totalDue: 25
                    agentHints:
                      suggestedNextActions: []
                      relatedResources: []
                      confidence: 1
                      sourceQuality: high
                      validityPeriod: long
                      contextNeeded: []
                      assumptions: []
                      riskFactors: []
                      dependencies: []
                      estimatedImpact:
                        benefit: 0
                        effort: 0.1
                        roi: 0
                      preferenceAlignment: []
                      reasoning: review queue retrieved
                    metadata:
                      toolVersion: 0.1.0
                      timestamp: 2026-02-24T00:00:00.000Z
                      executionTime: 8
                      serviceVersion: 0.1.0
                      correlationId: cor_123
                      resultCode: SUCCESS
                      retryClass: unknown
                  metadata:
                    requestId: req_123
                    correlationId: cor_123
                    timestamp: 2026-02-24T00:00:00.000Z
                    processingTimeMs: 10
      "400":
        $ref: ../openapi.yaml#/components/responses/BadRequest
      "401":
        $ref: ../openapi.yaml#/components/responses/Unauthorized
      "403":
        $ref: ../openapi.yaml#/components/responses/Forbidden
      "404":
        $ref: ../openapi.yaml#/components/responses/ToolNotFound
      "429":
        $ref: ../openapi.yaml#/components/responses/TooManyRequests
      "422":
        description: Tool execution failed validation or business constraints.
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/ToolExecuteResponse
            examples:
              inputValidationFailure:
                value:
                  data:
                    success: false
                    error:
                      code: TOOL_INPUT_VALIDATION_FAILED
                      message: input.userId is required
                    agentHints:
                      suggestedNextActions: []
                      relatedResources: []
                      confidence: 1
                      sourceQuality: high
                      validityPeriod: long
                      contextNeeded: []
                      assumptions: []
                      riskFactors: []
                      dependencies: []
                      estimatedImpact:
                        benefit: 0
                        effort: 0.1
                        roi: 0
                      preferenceAlignment: []
                      reasoning: Tool input does not match required schema
                    metadata:
                      toolVersion: 0.1.0
                      timestamp: 2026-02-24T00:00:00.000Z
                      executionTime: 0
                      serviceVersion: 0.1.0
                      correlationId: cor_123
                      resultCode: TOOL_INPUT_VALIDATION_FAILED
                      failureClass: input.schema.invalid
                      retryClass: permanent
                      failureDomain: validation
                      httpStatusHint: 422
                      validationErrors:
                        - input.userId is required
                  metadata:
                    requestId: req_123
                    correlationId: cor_123
                    timestamp: 2026-02-24T00:00:00.000Z
                    processingTimeMs: 1
              missingScopeFailure:
                value:
                  data:
                    success: false
                    error:
                      code: FORBIDDEN_MISSING_SCOPE
                      message: "Missing required scopes: scheduler:plan"
                      failureClass: auth.missing_scope
                    agentHints:
                      suggestedNextActions: []
                      relatedResources: []
                      confidence: 1
                      sourceQuality: high
                      validityPeriod: long
                      contextNeeded: []
                      assumptions: []
                      riskFactors: []
                      dependencies: []
                      estimatedImpact:
                        benefit: 0
                        effort: 0.1
                        roi: 0
                      preferenceAlignment: []
                      reasoning: Caller lacks required tool scopes
                    metadata:
                      toolVersion: 0.1.0
                      timestamp: 2026-02-24T00:00:00.000Z
                      executionTime: 1
                      serviceVersion: 0.1.0
                      correlationId: cor_123
                      resultCode: FORBIDDEN_MISSING_SCOPE
                      failureClass: auth.missing_scope
                      retryClass: permanent
                      failureDomain: auth
                      httpStatusHint: 403
                      scopeEvaluation:
                        match: all
                        requiredScopes:
                          - scheduler:plan
                          - scheduler:tools:execute
                        grantedScopes:
                          - scheduler:tools:execute
                        missingScopes:
                          - scheduler:plan
                  metadata:
                    requestId: req_123
                    correlationId: cor_123
                    timestamp: 2026-02-24T00:00:00.000Z
                    processingTimeMs: 1
      "500":
        $ref: ../openapi.yaml#/components/responses/InternalServerError
