ToolPriority:
  type: string
  enum: [P0, P1, P2]

ToolDefinition:
  type: object
  properties:
    name:
      type: string
    description:
      type: string
    service:
      type: string
      example: scheduler-service
    priority:
      $ref: "#/ToolPriority"
    scopeRequirement:
      $ref: ./common.yaml#/ScopeRequirement
    capabilities:
      type: object
      properties:
        idempotent:
          type: boolean
        sideEffects:
          type: boolean
        timeoutMs:
          type: integer
          minimum: 1
        costClass:
          type: string
          enum: [low, medium, high]
      required: [idempotent, sideEffects, timeoutMs, costClass]
    inputSchema:
      type: object
      additionalProperties: true
  required:
    - name
    - description
    - service
    - priority
    - scopeRequirement
    - capabilities
    - inputSchema

ToolListResponse:
  type: object
  properties:
    data:
      type: object
      properties:
        tools:
          type: array
          items:
            $ref: "#/ToolDefinition"
        count:
          type: integer
          minimum: 0
      required: [tools, count]
    metadata:
      $ref: ./common.yaml#/ApiResponseMetadata
  required: [data, metadata]

ToolExecuteRequest:
  type: object
  properties:
    tool:
      type: string
      minLength: 1
    input:
      description: Tool input payload, validated by tool-specific schema.
      default: {}
      oneOf:
        - type: object
          additionalProperties: true
        - type: array
          items: {}
        - type: string
        - type: number
        - type: boolean
        - type: "null"
  required: [tool]

ToolExecutionMetadata:
  type: object
  properties:
    toolVersion:
      type: string
    timestamp:
      type: string
      format: date-time
    executionTime:
      type: number
      minimum: 0
    serviceVersion:
      type: string
    traceId:
      type: string
      nullable: true
    correlationId:
      type: string
      nullable: true
    cached:
      type: boolean
      nullable: true
    resultCode:
      type: string
      description: Machine-readable execution result classification.
      example: SUCCESS
    retryClass:
      type: string
      enum: [transient, permanent, unknown]
      description: Retry behavior classification for orchestration clients.
    failureClass:
      $ref: ../../../shared/components/schemas/tooling.yaml#/ToolFailureClass
    failureDomain:
      type: string
      enum: [network, validation, auth, internal, dependency, state, abuse]
      description: Primary failure domain for triage when success=false.
    httpStatusHint:
      type: integer
      minimum: 100
      maximum: 599
      description: Suggested HTTP status classification for clients.
    retryAfterMs:
      type: integer
      minimum: 0
      description: Suggested delay before retry when retryClass=transient.
    isTimeout:
      type: boolean
      description: Indicates timeout-driven failure.
      nullable: true
    isCircuitOpen:
      type: boolean
      description: Indicates dependency circuit-breaker open state.
      nullable: true
    dependencyName:
      type: string
      description: Optional dependency identifier for dependency failures.
      nullable: true
    validationErrors:
      type: array
      items:
        type: string
      description: Optional field-level validation failures.
    scopeEvaluation:
      type: object
      description: Optional authorization evaluation diagnostics.
      properties:
        match:
          type: string
          enum: [all, any]
        requiredScopes:
          type: array
          items:
            type: string
        grantedScopes:
          type: array
          items:
            type: string
        missingScopes:
          type: array
          items:
            type: string
      required: [match, requiredScopes]
  required: [toolVersion, timestamp, executionTime, serviceVersion]

ToolExecutionError:
  type: object
  properties:
    code:
      type: string
    message:
      type: string
    failureClass:
      $ref: ../../../shared/components/schemas/tooling.yaml#/ToolFailureClass
    retryable:
      type: boolean
    retryAfterMs:
      type: integer
      minimum: 0
    details:
      type: object
      additionalProperties: true
      nullable: true
  required: [code, message]

ToolExecutionResult:
  type: object
  properties:
    success:
      type: boolean
    data:
      nullable: true
    error:
      $ref: "#/ToolExecutionError"
    agentHints:
      $ref: ./common.yaml#/AgentHints
    metadata:
      $ref: "#/ToolExecutionMetadata"
  required: [success, agentHints]

ToolExecuteResponse:
  type: object
  properties:
    data:
      $ref: "#/ToolExecutionResult"
    metadata:
      $ref: ./common.yaml#/ApiResponseMetadata
  required: [data, metadata]

ToolFailureClass:
  $ref: ../../../shared/components/schemas/tooling.yaml#/ToolFailureClass

ToolFailureClassificationEntry:
  $ref: ../../../shared/components/schemas/tooling.yaml#/ToolFailureClassificationEntry

ToolFailureClassificationCatalog:
  allOf:
    - $ref: ../../../shared/components/schemas/tooling.yaml#/ToolFailureClassificationCatalog
  example:
    version: 1.0.0
    entries:
      - resultCode: TOOL_INPUT_VALIDATION_FAILED
        failureClass: input.schema.invalid
        retryClass: permanent
        failureDomain: validation
        retryable: false
        notes: Input does not match declared tool inputSchema.
      - resultCode: FORBIDDEN_MISSING_SCOPE
        failureClass: auth.missing_scope
        retryClass: permanent
        failureDomain: auth
        retryable: false
        notes: Caller token lacks one or more requiredScopes.
      - resultCode: RATE_LIMIT_EXCEEDED
        failureClass: rate.limit.exceeded
        retryClass: transient
        failureDomain: abuse
        retryable: true
        notes: Caller should retry after retryAfterMs.
      - resultCode: DEPENDENCY_TIMEOUT
        failureClass: dependency.timeout
        retryClass: transient
        failureDomain: dependency
        retryable: true
        notes: Upstream dependency timed out.
      - resultCode: HANDLER_EXCEPTION
        failureClass: internal.exception
        retryClass: unknown
        failureDomain: internal
        retryable: false
        notes: Unhandled exception in tool handler.
