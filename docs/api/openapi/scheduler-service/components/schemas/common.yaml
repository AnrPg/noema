ErrorInfo:
  type: object
  properties:
    code:
      type: string
      minLength: 1
    message:
      type: string
      minLength: 1
    details:
      description: Optional structured error context.
      nullable: true
  required: [code, message]

ApiResponseMetadata:
  type: object
  properties:
    requestId:
      type: string
      description: Correlation identifier for request tracing.
    timestamp:
      type: string
      format: date-time
    serviceName:
      type: string
      example: scheduler-service
    serviceVersion:
      type: string
      example: 0.1.0
    executionTime:
      type: number
      minimum: 0
      description: Request processing time in milliseconds.
    cached:
      type: boolean
      nullable: true
    count:
      type: integer
      nullable: true
      minimum: 0
    additional:
      type: object
      nullable: true
      additionalProperties: true
  required:
    - requestId
    - timestamp
    - serviceName
    - serviceVersion
    - executionTime

AgentHintAction:
  type: object
  properties:
    action:
      type: string
    description:
      type: string
    priority:
      type: string
      enum: [high, medium, low]
  required: [action, description, priority]

EstimatedImpact:
  type: object
  properties:
    benefit:
      type: number
    effort:
      type: number
    roi:
      type: number
  required: [benefit, effort, roi]

AgentHints:
  type: object
  properties:
    suggestedNextActions:
      type: array
      items:
        $ref: "#/AgentHintAction"
    relatedResources:
      type: array
      items:
        type: object
        additionalProperties: true
    confidence:
      type: number
      minimum: 0
      maximum: 1
    sourceQuality:
      type: string
      enum: [high, medium, low]
    validityPeriod:
      type: string
      enum: [short, medium, long]
    contextNeeded:
      type: array
      items:
        type: string
    assumptions:
      type: array
      items:
        type: string
    riskFactors:
      type: array
      items:
        type: string
    dependencies:
      type: array
      items:
        type: string
    estimatedImpact:
      $ref: "#/EstimatedImpact"
    preferenceAlignment:
      type: array
      items:
        type: object
        additionalProperties: true
    reasoning:
      type: string
  required:
    - suggestedNextActions
    - relatedResources
    - confidence
    - sourceQuality
    - validityPeriod
    - contextNeeded
    - assumptions
    - riskFactors
    - dependencies
    - estimatedImpact
    - preferenceAlignment
    - reasoning

HealthStatus:
  type: string
  enum: [healthy, unhealthy]

HealthCheckEntry:
  type: object
  properties:
    status:
      type: string
      enum: [pass, fail]
    latency:
      type: number
      minimum: 0
  required: [status]

HealthResponse:
  type: object
  properties:
    status:
      $ref: "#/HealthStatus"
    timestamp:
      type: string
      format: date-time
    version:
      type: string
      example: 0.1.0
    uptime:
      type: number
      minimum: 0
    checks:
      type: object
      additionalProperties:
        $ref: "#/HealthCheckEntry"
  required: [status, timestamp, version, uptime]

HealthLiveResponse:
  type: object
  properties:
    status:
      type: string
      enum: [ok]
  required: [status]

HealthReadyResponse:
  type: object
  properties:
    status:
      type: string
      enum: [ready, not_ready]
  required: [status]
