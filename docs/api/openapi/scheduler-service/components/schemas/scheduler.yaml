UserId:
  type: string
  pattern: "^usr_[A-Za-z0-9_-]{21}$"
  example: usr_V1StGXR8_Z5jdHi6B-myT

CardId:
  type: string
  pattern: "^card_[A-Za-z0-9_-]{21}$"
  example: card_V1StGXR8_Z5jdHi6B-myT

CorrelationId:
  type: string
  description: Request correlation identifier generated by Fastify.
  example: cor_lm2z3f9f

SessionId:
  type: string
  pattern: "^ses_[A-Za-z0-9_-]{21}$"
  example: ses_V1StGXR8_Z5jdHi6B-myT

SchedulerAlgorithm:
  type: string
  enum: [fsrs, hlr, sm2]

SchedulerLaneMix:
  type: object
  properties:
    retention:
      type: number
      minimum: 0
      maximum: 1
      description: Target share for retention-lane cards.
    calibration:
      type: number
      minimum: 0
      maximum: 1
      description: Target share for calibration-lane cards.
  required: [retention, calibration]

DualLanePlanRequest:
  type: object
  properties:
    userId:
      $ref: "#/UserId"
    retentionCardIds:
      type: array
      items:
        $ref: "#/CardId"
      default: []
    calibrationCardIds:
      type: array
      items:
        $ref: "#/CardId"
      default: []
    targetMix:
      $ref: "#/SchedulerLaneMix"
    maxCards:
      type: integer
      minimum: 1
      maximum: 500
  required: [userId, retentionCardIds, calibrationCardIds, maxCards]

DualLanePlan:
  type: object
  properties:
    planVersion:
      type: string
      enum: [v1]
    laneMix:
      $ref: "#/SchedulerLaneMix"
    selectedCardIds:
      type: array
      items:
        $ref: "#/CardId"
    retentionSelected:
      type: integer
      minimum: 0
    calibrationSelected:
      type: integer
      minimum: 0
    rationale:
      type: string
  required:
    - planVersion
    - laneMix
    - selectedCardIds
    - retentionSelected
    - calibrationSelected
    - rationale

DualLanePlanResponse:
  type: object
  properties:
    data:
      $ref: "#/DualLanePlan"
    agentHints:
      $ref: ./common.yaml#/AgentHints
    metadata:
      $ref: ./common.yaml#/ApiResponseMetadata
  required: [data, agentHints, metadata]

CardScheduleInput:
  type: object
  properties:
    cardId:
      $ref: "#/CardId"
    algorithm:
      $ref: "#/SchedulerAlgorithm"
    lastReviewAt:
      type: string
      format: date-time
      nullable: true
    stability:
      type: number
      minimum: 0
      nullable: true
    difficulty:
      type: number
      minimum: 0
      nullable: true
    lapses:
      type: integer
      minimum: 0
      nullable: true
  required: [cardId, algorithm]

CardScheduleDecision:
  type: object
  properties:
    cardId:
      $ref: "#/CardId"
    nextReviewAt:
      type: string
      format: date-time
    intervalDays:
      type: number
      minimum: 0
    lane:
      type: string
      enum: [retention, calibration]
    algorithm:
      $ref: "#/SchedulerAlgorithm"
    rationale:
      type: string
  required: [cardId, nextReviewAt, intervalDays, lane, algorithm, rationale]

BatchScheduleUpdateRequest:
  type: object
  properties:
    userId:
      $ref: "#/UserId"
    decisions:
      type: array
      minItems: 1
      maxItems: 500
      items:
        $ref: "#/CardScheduleDecision"
    source:
      type: string
      enum: [agent, session-service, scheduler-service]
    reason:
      type: string
      minLength: 1
  required: [userId, decisions, source]

BatchScheduleUpdateResponse:
  type: object
  properties:
    data:
      type: object
      properties:
        accepted:
          type: integer
          minimum: 0
        rejected:
          type: integer
          minimum: 0
        updatedCardIds:
          type: array
          items:
            $ref: "#/CardId"
      required: [accepted, rejected, updatedCardIds]
    agentHints:
      $ref: ./common.yaml#/AgentHints
    metadata:
      $ref: ./common.yaml#/ApiResponseMetadata
  required: [data, agentHints, metadata]

CardProjection:
  type: object
  properties:
    cardId:
      $ref: "#/CardId"
    algorithm:
      $ref: "#/SchedulerAlgorithm"
    nextReviewAt:
      type: string
      format: date-time
    retentionProbability:
      type: number
      minimum: 0
      maximum: 1
    stability:
      type: number
      minimum: 0
      nullable: true
    difficulty:
      type: number
      minimum: 0
      nullable: true
    recommendedLane:
      type: string
      enum: [retention, calibration]
  required:
    - cardId
    - algorithm
    - nextReviewAt
    - retentionProbability
    - recommendedLane

CardProjectionResponse:
  type: object
  properties:
    data:
      $ref: "#/CardProjection"
    agentHints:
      $ref: ./common.yaml#/AgentHints
    metadata:
      $ref: ./common.yaml#/ApiResponseMetadata
  required: [data, agentHints, metadata]

ReviewWindowProposalRequest:
  type: object
  properties:
    userId:
      $ref: "#/UserId"
    cards:
      type: array
      minItems: 1
      maxItems: 500
      items:
        $ref: "#/CardScheduleInput"
    asOf:
      type: string
      format: date-time
      nullable: true
  required: [userId, cards]

ReviewWindowProposal:
  type: object
  properties:
    generatedAt:
      type: string
      format: date-time
    decisions:
      type: array
      items:
        $ref: "#/CardScheduleDecision"
    policyVersion:
      $ref: ./common.yaml#/PolicyVersion
    orchestration:
      $ref: ./common.yaml#/OrchestrationMetadata
  required: [generatedAt, decisions, policyVersion, orchestration]

ReviewWindowProposalResponse:
  type: object
  properties:
    data:
      $ref: "#/ReviewWindowProposal"
    agentHints:
      $ref: ./common.yaml#/AgentHints
    metadata:
      $ref: ./common.yaml#/ApiResponseMetadata
  required: [data, agentHints, metadata]

SessionConstraints:
  type: object
  properties:
    targetCards:
      type: integer
      minimum: 1
      maximum: 500
    maxSessionDurationMinutes:
      type: integer
      minimum: 1
      maximum: 240
    includeCalibration:
      type: boolean
      default: true
    laneMix:
      $ref: "#/SchedulerLaneMix"
  required: [targetCards]

SessionCandidateCard:
  type: object
  properties:
    cardId:
      $ref: "#/CardId"
    lane:
      type: string
      enum: [retention, calibration]
    dueAt:
      type: string
      format: date-time
      nullable: true
    retentionProbability:
      type: number
      minimum: 0
      maximum: 1
      nullable: true
    estimatedSeconds:
      type: integer
      minimum: 1
      nullable: true
  required: [cardId, lane]

CandidateScore:
  type: object
  properties:
    urgency:
      type: number
      minimum: 0
      maximum: 1
    retentionRisk:
      type: number
      minimum: 0
      maximum: 1
    forgettingRisk:
      type: number
      minimum: 0
      maximum: 1
      deprecated: true
    calibrationValue:
      type: number
      minimum: 0
      maximum: 1
    composite:
      type: number
      minimum: 0
      maximum: 1
  required: [urgency, retentionRisk, calibrationValue, composite]

SessionCandidateProposalRequest:
  type: object
  properties:
    userId:
      $ref: "#/UserId"
    cards:
      type: array
      minItems: 1
      maxItems: 2000
      items:
        $ref: "#/SessionCandidateCard"
    constraints:
      $ref: "#/SessionConstraints"
    sourceDeckId:
      type: string
      nullable: true
    sessionContext:
      type: object
      additionalProperties: true
      nullable: true
  required: [userId, cards, constraints]

SessionCandidateProposal:
  type: object
  properties:
    selectedCardIds:
      type: array
      items:
        $ref: "#/CardId"
    excludedCardIds:
      type: array
      items:
        $ref: "#/CardId"
    scores:
      type: array
      items:
        type: object
        properties:
          cardId:
            $ref: "#/CardId"
          score:
            $ref: "#/CandidateScore"
        required: [cardId, score]
    scoringBreakdown:
      $ref: ./common.yaml#/ScoringBreakdown
    policyVersion:
      $ref: ./common.yaml#/PolicyVersion
    orchestration:
      $ref: ./common.yaml#/OrchestrationMetadata
    rationale:
      type: string
  required:
    - selectedCardIds
    - excludedCardIds
    - scores
    - policyVersion
    - orchestration
    - rationale

SessionCandidateProposalResponse:
  type: object
  properties:
    data:
      $ref: "#/SessionCandidateProposal"
    agentHints:
      $ref: ./common.yaml#/AgentHints
    metadata:
      $ref: ./common.yaml#/ApiResponseMetadata
  required: [data, agentHints, metadata]

SessionTelemetrySnapshot:
  type: object
  properties:
    elapsedSeconds:
      type: integer
      minimum: 0
    cardsCompleted:
      type: integer
      minimum: 0
    cardsRemaining:
      type: integer
      minimum: 0
    rollingAccuracy:
      type: number
      minimum: 0
      maximum: 1
      nullable: true
    rollingLatencyMs:
      type: number
      minimum: 0
      nullable: true
    additionalSignals:
      type: object
      additionalProperties: true
      nullable: true
  required: [elapsedSeconds, cardsCompleted, cardsRemaining]

SessionReconcileRequest:
  type: object
  properties:
    userId:
      $ref: "#/UserId"
    currentCardIds:
      type: array
      items:
        $ref: "#/CardId"
      default: []
    candidatePool:
      type: array
      items:
        $ref: "#/SessionCandidateCard"
      default: []
    telemetry:
      $ref: "#/SessionTelemetrySnapshot"
    constraints:
      $ref: "#/SessionConstraints"
  required: [userId, telemetry, constraints]

SessionReconcileResponse:
  type: object
  properties:
    data:
      type: object
      properties:
        keepCardIds:
          type: array
          items:
            $ref: "#/CardId"
        addCardIds:
          type: array
          items:
            $ref: "#/CardId"
        dropCardIds:
          type: array
          items:
            $ref: "#/CardId"
        rationale:
          type: string
        policyVersion:
          $ref: ./common.yaml#/PolicyVersion
        orchestration:
          $ref: ./common.yaml#/OrchestrationMetadata
      required: [keepCardIds, addCardIds, dropCardIds, rationale, policyVersion, orchestration]
    agentHints:
      $ref: ./common.yaml#/AgentHints
    metadata:
      $ref: ./common.yaml#/ApiResponseMetadata
  required: [data, agentHints, metadata]

SessionCardAdjustment:
  type: object
  properties:
    cardId:
      $ref: "#/CardId"
    action:
      type: string
      enum: [add, remove, keep]
    reason:
      type: string
      minLength: 1
  required: [cardId, action, reason]

SessionAdjustmentRequest:
  type: object
  properties:
    userId:
      $ref: "#/UserId"
    adjustments:
      type: array
      minItems: 1
      maxItems: 1000
      items:
        $ref: "#/SessionCardAdjustment"
    telemetry:
      $ref: "#/SessionTelemetrySnapshot"
  required: [userId, adjustments]

SessionAdjustmentResponse:
  type: object
  properties:
    data:
      type: object
      properties:
        applied:
          type: integer
          minimum: 0
        skipped:
          type: integer
          minimum: 0
        resultingCardIds:
          type: array
          items:
            $ref: "#/CardId"
        rationale:
          type: string
        policyVersion:
          $ref: ./common.yaml#/PolicyVersion
        orchestration:
          $ref: ./common.yaml#/OrchestrationMetadata
      required: [applied, skipped, resultingCardIds, rationale, policyVersion, orchestration]
    agentHints:
      $ref: ./common.yaml#/AgentHints
    metadata:
      $ref: ./common.yaml#/ApiResponseMetadata
  required: [data, agentHints, metadata]

SessionCandidateSimulationRequest:
  type: object
  properties:
    userId:
      $ref: "#/UserId"
    cards:
      type: array
      minItems: 1
      maxItems: 2000
      items:
        $ref: "#/SessionCandidateCard"
    constraints:
      $ref: "#/SessionConstraints"
    whatIfAdjustments:
      type: object
      additionalProperties: true
      nullable: true
      description: Scenario-only knobs used for simulation without persistence.
    sessionContext:
      type: object
      additionalProperties: true
      nullable: true
  required: [userId, cards, constraints]

SessionCandidateSimulationResponse:
  type: object
  properties:
    data:
      type: object
      properties:
        selectedCardIds:
          type: array
          items:
            $ref: "#/CardId"
        excludedCardIds:
          type: array
          items:
            $ref: "#/CardId"
        scores:
          type: array
          items:
            type: object
            properties:
              cardId:
                $ref: "#/CardId"
              score:
                $ref: "#/CandidateScore"
            required: [cardId, score]
        scoringBreakdown:
          $ref: ./common.yaml#/ScoringBreakdown
        policyVersion:
          $ref: ./common.yaml#/PolicyVersion
        sideEffectFree:
          type: boolean
          enum: [true]
      required:
        - selectedCardIds
        - excludedCardIds
        - scores
        - policyVersion
        - sideEffectFree
    agentHints:
      $ref: ./common.yaml#/AgentHints
    metadata:
      $ref: ./common.yaml#/ApiResponseMetadata
  required: [data, agentHints, metadata]

CardScheduleCommitRequest:
  type: object
  properties:
    userId:
      $ref: "#/UserId"
    decision:
      $ref: "#/CardScheduleDecision"
    policyVersion:
      $ref: ./common.yaml#/PolicyVersion
    orchestration:
      $ref: ./common.yaml#/OrchestrationMetadata
    reason:
      type: string
      minLength: 1
  required: [userId, decision, policyVersion, orchestration]

CardScheduleCommitResponse:
  type: object
  properties:
    data:
      type: object
      properties:
        commitId:
          type: string
        cardId:
          $ref: "#/CardId"
        status:
          type: string
          enum: [committed]
        policyVersion:
          $ref: ./common.yaml#/PolicyVersion
        orchestration:
          $ref: ./common.yaml#/OrchestrationMetadata
      required: [commitId, cardId, status, policyVersion, orchestration]
    agentHints:
      $ref: ./common.yaml#/AgentHints
    metadata:
      $ref: ./common.yaml#/ApiResponseMetadata
  required: [data, agentHints, metadata]

BatchScheduleCommitRequest:
  type: object
  properties:
    userId:
      $ref: "#/UserId"
    decisions:
      type: array
      minItems: 1
      maxItems: 500
      items:
        $ref: "#/CardScheduleDecision"
    source:
      type: string
      enum: [agent, session-service, scheduler-service]
    policyVersion:
      $ref: ./common.yaml#/PolicyVersion
    orchestration:
      $ref: ./common.yaml#/OrchestrationMetadata
    reason:
      type: string
      minLength: 1
  required: [userId, decisions, source, policyVersion, orchestration]

BatchScheduleCommitResponse:
  type: object
  properties:
    data:
      type: object
      properties:
        commitId:
          type: string
        accepted:
          type: integer
          minimum: 0
        rejected:
          type: integer
          minimum: 0
        updatedCardIds:
          type: array
          items:
            $ref: "#/CardId"
        policyVersion:
          $ref: ./common.yaml#/PolicyVersion
        orchestration:
          $ref: ./common.yaml#/OrchestrationMetadata
      required: [commitId, accepted, rejected, updatedCardIds, policyVersion, orchestration]
    agentHints:
      $ref: ./common.yaml#/AgentHints
    metadata:
      $ref: ./common.yaml#/ApiResponseMetadata
  required: [data, agentHints, metadata]
