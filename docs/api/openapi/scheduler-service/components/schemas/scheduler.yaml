UserId:
  type: string
  pattern: "^usr_[A-Za-z0-9_-]{21}$"
  example: usr_V1StGXR8_Z5jdHi6B-myT

CardId:
  type: string
  pattern: "^card_[A-Za-z0-9_-]{21}$"
  example: card_V1StGXR8_Z5jdHi6B-myT

CorrelationId:
  type: string
  description: Request correlation identifier generated by Fastify.
  example: cor_lm2z3f9f

SchedulerLaneMix:
  type: object
  properties:
    retention:
      type: number
      minimum: 0
      maximum: 1
      description: Target share for retention-lane cards.
    calibration:
      type: number
      minimum: 0
      maximum: 1
      description: Target share for calibration-lane cards.
  required: [retention, calibration]

DualLanePlanRequest:
  type: object
  properties:
    userId:
      $ref: "#/UserId"
    retentionCardIds:
      type: array
      items:
        $ref: "#/CardId"
      default: []
    calibrationCardIds:
      type: array
      items:
        $ref: "#/CardId"
      default: []
    targetMix:
      $ref: "#/SchedulerLaneMix"
    maxCards:
      type: integer
      minimum: 1
      maximum: 500
  required: [userId, retentionCardIds, calibrationCardIds, maxCards]

DualLanePlan:
  type: object
  properties:
    planVersion:
      type: string
      enum: [v1]
    laneMix:
      $ref: "#/SchedulerLaneMix"
    selectedCardIds:
      type: array
      items:
        $ref: "#/CardId"
    retentionSelected:
      type: integer
      minimum: 0
    calibrationSelected:
      type: integer
      minimum: 0
    rationale:
      type: string
  required:
    - planVersion
    - laneMix
    - selectedCardIds
    - retentionSelected
    - calibrationSelected
    - rationale

DualLanePlanResponse:
  type: object
  properties:
    data:
      $ref: "#/DualLanePlan"
    agentHints:
      $ref: ./common.yaml#/AgentHints
    metadata:
      $ref: ./common.yaml#/ApiResponseMetadata
  required: [data, agentHints, metadata]
