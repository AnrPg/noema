# =============================================================================
# Noema Local Development Overrides
# =============================================================================
# This file extends docker-compose.yml with local development configurations.
# Includes additional tools, observability stack, and the API gateway.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up -d
#
# The API gateway (Traefik) unifies all backend services behind a single
# origin at http://localhost:8080. See infrastructure/gateway/ for config.
# =============================================================================

services:
  # ===========================================================================
  # API Gateway — Traefik (Phase 00: Spinal Cord)
  # ===========================================================================
  # Routes all frontend/agent traffic to the correct backend service based on
  # URL path prefix. Handles CORS, prefix stripping, and WebSocket upgrades.
  #
  # Dashboard: http://localhost:8082
  # API:       http://localhost:8080
  gateway:
    image: traefik:v3.2
    container_name: noema-gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-8080}:8080" # API entrypoint
      - "${GATEWAY_DASHBOARD_PORT:-8082}:8082" # Traefik dashboard
    volumes:
      - ./infrastructure/gateway/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./infrastructure/gateway/dynamic.yml:/etc/traefik/dynamic.yml:ro
    extra_hosts:
      # Allow Traefik to reach services running on the host via pnpm dev
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - noema-network

  # ===========================================================================
  # Health Aggregator — Aggregates health of all downstream services
  # ===========================================================================
  health-aggregator:
    build:
      context: ./infrastructure/gateway/health
      dockerfile: Dockerfile
    container_name: noema-health-aggregator
    restart: unless-stopped
    environment:
      PORT: "8090"
      USER_SERVICE_URL: "http://host.docker.internal:3002"
      SESSION_SERVICE_URL: "http://host.docker.internal:3003"
      CONTENT_SERVICE_URL: "http://host.docker.internal:3005"
      KNOWLEDGE_GRAPH_SERVICE_URL: "http://host.docker.internal:3006"
      SCHEDULER_SERVICE_URL: "http://host.docker.internal:3009"
      HLR_SIDECAR_URL: "http://hlr-sidecar:8020"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      gateway:
        condition: service_healthy
    networks:
      - noema-network

  # ===========================================================================
  # PostgreSQL Development Overrides
  # ===========================================================================
  postgres:
    environment:
      # Enable additional logging for development
      POSTGRES_INITDB_ARGS: "--data-checksums"
    ports:
      - "${POSTGRES_PORT:-5432}:5432" # Use env var for external port

  # ===========================================================================
  # Redis Commander - Redis GUI
  # ===========================================================================
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: noema-redis-commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "${REDIS_COMMANDER_PORT:-8081}:8081"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - noema-network

  # ===========================================================================
  # pgAdmin - PostgreSQL GUI
  # ===========================================================================
  pgadmin:
    image: dpage/pgadmin4:8.14
    container_name: noema-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@noema.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - noema-network

  # ===========================================================================
  # Mailpit - Local Email Testing (replaces real email service)
  # ===========================================================================
  mailpit:
    image: axllent/mailpit:v1.21
    container_name: noema-mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_WEB_PORT:-8025}:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    networks:
      - noema-network

  # ===========================================================================
  # Observability: Prometheus
  # ===========================================================================
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: noema-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./infrastructure/docker/prometheus:/etc/prometheus:ro
      - prometheus_data:/prometheus
    networks:
      - noema-network

  # ===========================================================================
  # Observability: Grafana
  # ===========================================================================
  grafana:
    image: grafana/grafana:11.4.0
    container_name: noema-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: false
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-piechart-panel
    ports:
      - "${GRAFANA_PORT:-3030}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/docker/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - noema-network

  # ===========================================================================
  # Observability: Jaeger (Distributed Tracing)
  # ===========================================================================
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: noema-jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_ZIPKIN_HOST_PORT: ":9411"
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"
      - "6831:6831/udp" # Jaeger thrift compact
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
    networks:
      - noema-network

# =============================================================================
# Additional Volumes for Local Development
# =============================================================================
volumes:
  pgadmin_data:
    name: noema-pgadmin-data
  prometheus_data:
    name: noema-prometheus-data
  grafana_data:
    name: noema-grafana-data
